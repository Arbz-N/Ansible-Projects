---
# site.yml — Main playbook: install and configure Nginx on all web servers
# Run from: ~/ansible-ssm-lab/
# Command : ansible-playbook site.yml

- name: Install and Configure Nginx on Web Servers
  hosts: all
  # "all" resolves to both web-server-01 and web-server-02 via the EC2 inventory.

  become: true
  # ssm-user has sudo rights but is not root. become=true elevates privilege
  # for package installation, service management, and writing to /etc/.

  connection: community.aws.aws_ssm
  # Use the SSM connection plugin instead of SSH.
  # This plugin starts an SSM session over the AWS control plane.
  # No inbound port 22 is required on the target instances.

  vars:
    nginx_port: 80

  tasks:

    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes
      # update_cache runs apt-get update before installing.
      # Without it, apt may use a stale package index and fail on new AMIs.
      tags: install

    - name: Start and Enable Nginx service
      service:
        name: nginx
        state: started
        enabled: yes
      # enabled=yes ensures Nginx starts automatically after a reboot.
      # state=started ensures it is running right now.
      tags: service

    - name: Deploy custom Nginx configuration
      copy:
        src: files/nginx.conf
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: '0644'
      notify:
        - restart nginx
      # notify triggers the handler only when the file actually changes.
      # If the config is already identical, the restart is skipped.
      tags: configure

    - name: Deploy custom index page
      copy:
        content: |
          <html>
          <body>
            <h1>Deployed by Ansible via SSM</h1>
            <p>Server: {{ inventory_hostname }}</p>
          </body>
          </html>
        dest: /var/www/html/index.html
      # inventory_hostname resolves to the EC2 instance ID.
      # This lets you verify which server responded when testing in a browser.
      tags: configure

  handlers:

    - name: restart nginx
      service:
        name: nginx
        state: restarted
      # Handlers run once at the end of the play, after all tasks complete.
      # Even if multiple tasks notify this handler, it only restarts once.