# ansible.cfg — Ansible runtime configuration for the SSM lab
# Place this file at: ~/ansible-ssm-lab/ansible.cfg

[defaults]
# Dynamic EC2 inventory file (must end in .aws_ec2.yml)
inventory          = ./inventory/hosts.aws_ec2.yml

# SSM creates its own OS user — not the ubuntu user
remote_user        = ssm-user

# EC2 host keys change frequently; checking them causes false failures
host_key_checking  = False

# YAML output is easier to read than the default one-line format
stdout_callback    = yaml

# ssm-user cannot write to /home/ubuntu, so use /tmp instead
remote_tmp         = /tmp/.ansible/tmp

# Suppress the "interpreter auto-detection" warning on Python 3.12 nodes
interpreter_python = /usr/bin/python3.12

[inventory]
# Enable the EC2 dynamic inventory plugin from the amazon.aws collection
enable_plugins = amazon.aws.aws_ec2