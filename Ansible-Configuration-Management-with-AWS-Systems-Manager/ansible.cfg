[defaults]
inventory         = ./inventory/aws_ssm.yml
# SSM Fleet Manager provides the dynamic inventory

remote_user       = ubuntu
# Default user for Ubuntu instances

host_key_checking = False
# Disable SSH host key warning — using SSM connection, not SSH

stdout_callback   = yaml
# YAML output format is more readable than the default

[inventory]
enable_plugins = amazon.aws.aws_ssm
# Enable the SSM inventory plugin from the amazon.aws collection