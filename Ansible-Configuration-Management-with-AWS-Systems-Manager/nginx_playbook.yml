---
# nginx_playbook.yml
# Install, configure and start Nginx on all web_servers

- name: Install and Configure Nginx
  hosts: web_servers
  # Runs against all instances in the web_servers inventory group

  become: true
  # Run all tasks with sudo — required to install packages and manage services

  tasks:

    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes
      # apt module targets Ubuntu/Debian
      # state: present installs the package if it is not already installed
      # update_cache: yes runs apt-get update before installing
      # For Amazon Linux use the yum module instead

    - name: Ensure Nginx service is running
      service:
        name: nginx
        state: started
        enabled: yes
      # state: started ensures the service is running right now
      # enabled: yes ensures the service starts automatically on reboot

    - name: Copy custom Nginx configuration
      copy:
        src: nginx.conf
        dest: /etc/nginx/nginx.conf
      # src is the path on the control node
      # dest is the path on the target machine
      notify:
        - restart nginx
      # Triggers the restart nginx handler only if this task makes a change

  handlers:
  # Handlers run at the end of the play, and only if notified
  # They do not run repeatedly — only once per play regardless of notifications

    - name: restart nginx
      service:
        name: nginx
        state: restarted:
      # Gracefully restart Nginx to apply the new configuration


