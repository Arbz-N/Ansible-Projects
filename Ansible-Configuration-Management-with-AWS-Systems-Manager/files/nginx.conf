# nginx.conf — Custom Nginx configuration deployed by Ansible
# Place at: ~/ansible-ssm-lab/files/nginx.conf
# Ansible copies this file to /etc/nginx/nginx.conf on each target node.

user www-data;

# Let Nginx decide the optimal number of worker processes based on CPU count
worker_processes auto;

pid /run/nginx.pid;

events {
    # Maximum simultaneous connections per worker process
    worker_connections 1024;
}

http {
    # Efficient file transfer — bypasses user-space buffering for static files
    sendfile on;

    # Keep TCP connections open for up to 65 seconds to reduce handshake overhead
    keepalive_timeout 65;

    # Include standard MIME type mappings so browsers handle file types correctly
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Compress responses to reduce bandwidth usage
    gzip on;

    server {
        # Listen on port 80 — must match the Security Group inbound rule
        listen 80;

        # Underscore matches any Host header (catch-all virtual host)
        server_name _;

        root /var/www/html;
        index index.html;

        location / {
            # Serve the file if it exists, then try as a directory,
            # then return 404 — prevents falling through to a default page
            try_files $uri $uri/ =404;
        }
    }
}