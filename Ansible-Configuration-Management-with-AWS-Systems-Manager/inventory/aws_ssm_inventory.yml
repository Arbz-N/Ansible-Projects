plugin: amazon.aws.aws_ssm
# Discover instances registered in AWS SSM Fleet Manager

regions:
  - your-region
# Replace with your actual region (e.g. us-east-1)

filters:
  tag:Environment: production
# Only include instances tagged with Environment=production
# web-server-01 and web-server-02 will be picked up
# ansible-control-node is excluded (no Environment tag)

hostnames:
  - instance-id
# Use the EC2 instance ID as the Ansible hostname

compose:
  ansible_host: instance_id
  ansible_connection: aws_ssm
# Connect via SSM — no SSH required