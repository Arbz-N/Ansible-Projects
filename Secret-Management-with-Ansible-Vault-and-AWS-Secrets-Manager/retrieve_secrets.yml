---
# retrieve_secrets.yml
# Retrieve secrets from AWS Secrets Manager and apply them on target hosts
# Run with: ansible-playbook retrieve_secrets.yml --vault-password-file ~/.vault_pass

- name: Retrieve and use secrets from AWS Secrets Manager
  hosts: localhost
  become: true
  connection: local

  vars_files:
    - secrets.yaml
    # Ansible Vault encrypted file — contains db_username, db_password, api_key

  tasks:

    - name: Retrieve secret from AWS Secrets Manager
      command: >
        aws secretsmanager get-secret-value
        --secret-id my-secret
        --query SecretString
        --output text
        --region your-region
      # Replace your-region with your actual AWS region
      register: secret_result
      delegate_to: localhost
      become: false
      # AWS CLI call runs locally — no elevation needed

    - name: Parse JSON output to extract secret fields
      set_fact:
        secrets: "{{ secret_result.stdout | from_json }}"
      # Converts the JSON string to an Ansible variable dict

    - name: Create application user with hashed password
      user:
        name: "{{ secrets.username }}"
        password: "{{ secrets.password | password_hash('sha512') }}"
        state: present
      no_log: true
      # no_log: true prevents the password from appearing in output or logs

    - name: Show db_username from Vault (debug only)
      debug:
        msg: "DB User from Vault: {{ db_username }}"
      # db_username comes from the Vault-encrypted secrets.yaml

    - name: Deploy application config with secrets
      copy:
        content: |
          DATABASE_USER={{ secrets.username }}
          DATABASE_PASS={{ secrets.password }}
          API_KEY={{ api_key }}
        dest: /etc/app/config.env
        owner: root
        group: root
        mode: '0600'
        # 0600 = only root can read — no other users
      no_log: true