[defaults]
host_key_checking  = False
remote_user        = ubuntu
private_key_file   = /root/your-key.pem
# Replace your-key.pem with the actual path to your private key

vault_password_file = ~/.vault_pass
# Avoid manual password entry on every playbook run
# Create this file with: echo "your-vault-password" > ~/.vault_pass && chmod 600 ~/.vault_pass
# NEVER commit .vault_pass to version control