# ansible.cfg — Ansible runtime configuration for the dynamic inventory lab
# Place at: /etc/ansible/ansible.cfg  OR  project directory (takes precedence)

# ============================================================
# CONFIG — replace placeholder values before use
# ============================================================
# /path/to/your-key.pem : full path to your EC2 SSH private key
# ============================================================

[defaults]
# Path to the dynamic inventory script.
# Ansible detects that this is a script (not a static file) because it is
# executable. It calls the script with --list at the start of each run.
inventory = /home/ubuntu/aws-dynamic-inventory.py

# Skip SSH host key verification.
# Appropriate for lab environments where instances are frequently replaced
# and their host keys change. Do not use in production.
host_key_checking = False

# The default OS user on Ubuntu EC2 instances launched from official AMIs.
remote_user = ubuntu

# Path to the private key that matches the key pair attached to the instances.
# Must be chmod 400 or Ansible will refuse to use it.
private_key_file = /path/to/your-key.pem